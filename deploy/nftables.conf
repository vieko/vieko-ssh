#!/usr/sbin/nft -f
#
# nftables ruleset for a box running vieko-ssh.
#
# Model:
#   - vieko-ssh listens unprivileged on :2222.
#   - Public port 22 is redirected to 2222 so `ssh vieko.dev` (no -p) lands in
#     the TUI — the "magic" front door.
#   - Your real admin OpenSSH is moved OFF 22 to :2200 (see README): edit
#     /etc/ssh/sshd_config -> `Port 2200`, key-only auth, then reload sshd.
#   - Per-source new-connection rate limiting is the primary DoS defense
#     (the app-level limiter is a backstop). Pair with the free Hetzner Cloud
#     Firewall in front of the box for L3/L4 filtering.
#
# Apply:   sudo nft -f deploy/nftables.conf
# Persist: sudo cp deploy/nftables.conf /etc/nftables.conf && sudo systemctl enable --now nftables

flush ruleset

table inet filter {
	# Sources that trip the rate limit get parked here for a while.
	set flood {
		type ipv4_addr
		flags dynamic, timeout
		timeout 1m
	}

	chain input {
		type filter hook input priority 0; policy drop;

		iif "lo" accept
		ct state established,related accept
		ct state invalid drop

		# ICMP (ping / path MTU) — keep it usable.
		ip protocol icmp accept
		ip6 nexthdr icmpv6 accept

		# Admin SSH (you only): key-only OpenSSH on 2200. No rate limit here —
		# key-only auth defeats brute force, and rate-limiting admin risks
		# locking yourself out. Restrict this to your own IP via the Hetzner
		# Cloud Firewall for real protection.
		tcp dport 2200 ct state new accept

		# Public TUI front door. Port 22 is DNAT'd to 2222 in prerouting
		# below, so both dports can arrive here depending on path. Per-source
		# flood protection: sources over 20 new conns/min get parked in @flood.
		tcp dport { 22, 2222 } ct state new add @flood { ip saddr limit rate over 20/minute } drop
		tcp dport { 22, 2222 } ip saddr @flood drop
		tcp dport { 22, 2222 } ct state new accept

		# Caddy: HTTP/HTTPS for the vieko.sh -> vieko.dev vanity redirect
		# (and Let's Encrypt ACME challenges on :80/:443).
		tcp dport { 80, 443 } ct state new accept
	}

	chain forward { type filter hook forward priority 0; policy drop; }
	chain output  { type filter hook output priority 0; policy accept; }
}

table inet nat {
	chain prerouting {
		type nat hook prerouting priority -100;
		# Front-door redirect: inbound 22 -> local 2222 (vieko-ssh).
		# inet family so this applies to both IPv4 and IPv6.
		tcp dport 22 redirect to :2222
	}
}
