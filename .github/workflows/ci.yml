name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" ./...
